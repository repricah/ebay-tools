name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, gha-runner]
    timeout-minutes: 15

    steps:
      - name: Clean workspace
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" "${{ github.workspace }}" || true
          sudo rm -rf "${{ github.workspace }}"/* "${{ github.workspace }}"/.[!.]* 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)" || { gofmt -d .; exit 1; }

      - name: Run tests
        run: go test ./... -count=1
